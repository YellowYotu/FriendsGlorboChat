<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>glorboChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

    <div class="sidebar">
        <h2 class="brand">glorbo</h2>
        <nav>
            <button class="nav-btn active" onclick="showPage('calls', this)">📞 Звонки</button>
            <button class="nav-btn" onclick="showPage('settings', this)">⚙️ Настройки</button>
        </nav>
    </div>

    <div class="main-content">
        <div id="calls" class="page active">
            <h1 class="page-title">Активные звонки</h1>
            <div class="card">
                <div class="call-item">
                    <div>
                        <span>Звонок 1 (Легенда)</span>
                    </div>
                    <a href="https://meet.google.com/ens-nmpk-xdc" target="_blank" class="btn-modern">Присоединиться</a>
                </div>
                <div class="call-item">
                    <div>
                        <span>Звонок 2 (Новый)</span>
                    </div>
                    <a href="https://meet.google.com/pka-zrfq-zoy?pli=1" target="_blank" class="btn-modern">Присоединиться</a>
                </div>
            </div>
        </div>

        <div id="settings" class="page">
            <h1 class="page-title">Настройки системы</h1>
            <div class="settings-container">
                <div class="settings-sidebar">
                    <button onclick="showSub('theme-part')" class="sub-btn">🎨 Тема</button>
                    <button onclick="showSub('custom-part')" class="sub-btn">✨ Кастомизация</button>
                    <button onclick="resetAll()" class="sub-btn reset">♻️ Сброс</button>
                </div>
                <div class="settings-main">
                    <div id="theme-part" class="sub-page active">
                        <h2>Выбор темы</h2>
                        <select id="theme-selector" onchange="changeTheme()">
                            <option value="dark">Тёмная</option>
                            <option value="light">Светлая</option>
                            <option value="neon">Неоновая</option>
                            <option value="cyber">Cyberpunk</option>
                        </select>
                    </div>
                    <div id="custom-part" class="sub-page">
                        <h2>Цвета</h2>
                        <label>Цвет кнопок:</label>
                        <input type="color" id="btnColor" oninput="updateCustomStyle()">
                        <label>Цвет фона карточек:</label>
                        <input type="color" id="cardColor" oninput="updateCustomStyle()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

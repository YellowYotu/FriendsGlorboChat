<html lang="ru">
<head>
    <style>
        body { transition: opacity ease-in 0.2s; } 
        body[unresolved] { opacity: 0; display: block; overflow: hidden; position: relative; } 
    </style>
    <meta charset="UTF-8">
    <title>glorboChat</title>
    <link rel="stylesheet" href="style.css">
    <!-- Библиотека для звонков -->
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body class="dark">
    <div class="sidebar">
        <h2 class="brand">glorbo</h2>
        <nav>
            <button class="nav-btn active" onclick="showPage('calls', this)">
                <svg viewBox="0 0 24 24" class="nav-icon"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"></path></svg>
                <span>Звонки</span>
            </button>
            <button class="nav-btn" onclick="showPage('settings', this)">
                <svg viewBox="0 0 24 24" class="nav-icon"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path></svg>
                <span>Настройки</span>
            </button>
        </nav>
    </div>

    <div class="main-content">
        <div id="calls" class="page active">
            <h1 class="page-title">Активные звонки</h1>
            <div class="card">
                <!-- Твой P2P блок -->
                <div class="call-item">
                    <div>
                        <span class="call-name">Прямая связь</span>
                        <div id="my-peer-id" style="font-size: 0.7rem; color: var(--accent);">ID: загрузка...</div>
                    </div>
                    <button onclick="initiateCall()" class="btn-modern">Позвонить</button>
                </div>
                <video id="remoteVideo" autoplay playsinline style="width: 100%; border-radius: 12px; background: #000; display: none; margin-top: 15px;"></video>
            </div>
        </div>

        <div id="settings" class="page">
            <h1 class="page-title">Настройки системы</h1>
            <div class="settings-container">
                <div class="settings-sidebar">
                    <button onclick="showSub('theme-part')" class="sub-btn active">🎨 Тема</button>
                    <button onclick="showSub('custom-part')" class="sub-btn">✨ Кастомизация</button>
                    <button onclick="resetAll()" class="sub-btn reset">♻️ Сброс</button>
                </div>
                <div class="settings-main">
                    <div id="theme-part" class="sub-page active">
                        <h2>Выбор темы</h2>
                        <div class="select-wrapper">
                            <select id="theme-selector" onchange="changeTheme()">
                                <option value="dark">Тёмная</option>
                                <option value="light">Светлая</option>
                                <option value="neon">Неоновая</option>
                                <option value="cyber">Cyberpunk</option>
                            </select>
                        </div>
                    </div>
                    <div id="custom-part" class="sub-page">
                        <h2>Цвета</h2>
                        <div class="color-picker-group">
                            <label>Цвет кнопок:</label>
                            <input type="color" id="btnColor" oninput="updateCustomStyle()">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
